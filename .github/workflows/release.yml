name: Release

# Verifies the panel bundle builds correctly when a release is published.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify panel bundle
        shell: bash
        run: |
          v=$(jq -r .version custom_components/homeassistant_dashboard_studio/manifest.json)
          dashboard="custom_components/homeassistant_dashboard_studio/dashboard.v${v}.js"
          editor="custom_components/homeassistant_dashboard_studio/studio-editor.v${v}.js"
          test -f "$dashboard"
          test -f "$editor"
          unexpected=$(grep -oE 'from "\./[^"]+\.js"' "$dashboard" | grep -v "./studio-editor.v${v}.js" || true)
          if [ -n "$unexpected" ]; then
            echo "dashboard bundle must only import ./studio-editor.v${v}.js as an optional chunk."
            echo "$unexpected"
            exit 1
          fi
