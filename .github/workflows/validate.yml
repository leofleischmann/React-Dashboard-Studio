name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build & HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check default dashboard compiles
        run: npm run check:default

      - run: npm run build

      - name: Verify embedded default project is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- src/studio/defaultProject.generated.ts; then
            echo "::error::defaultProject.generated.ts is stale."
            echo "Run 'npm run embed:default' and commit the result."
            git --no-pager diff --stat -- src/studio/defaultProject.generated.ts
            exit 1
          fi

      - name: Verify panel bundle
        shell: bash
        run: |
          test -f custom_components/homeassistant_dashboard_studio/dashboard.js
          if grep -q 'from "./' custom_components/homeassistant_dashboard_studio/dashboard.js; then
            echo "dashboard.js must not import other chunks."
            exit 1
          fi

      - name: Ensure committed bundle is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- custom_components/homeassistant_dashboard_studio/dashboard.js; then
            echo "::error::custom_components/.../dashboard.js is stale."
            echo "Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- custom_components/homeassistant_dashboard_studio/dashboard.js
            exit 1
          fi

      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
