name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build & HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify committed bundle filenames match manifest version
        shell: bash
        run: |
          v=$(jq -r .version custom_components/homeassistant_dashboard_studio/manifest.json)
          dir=custom_components/homeassistant_dashboard_studio
          shopt -s nullglob
          mismatched=()
          for f in "$dir"/dashboard.v*.js "$dir"/studio-editor.v*.js; do
            base=$(basename "$f")
            case "$base" in
              "dashboard.v${v}.js"|"studio-editor.v${v}.js") ;;
              *) mismatched+=("$base") ;;
            esac
          done
          if [ "${#mismatched[@]}" -gt 0 ]; then
            echo "::error::Bundle filename(s) do not match manifest version ${v}: ${mismatched[*]}"
            exit 1
          fi
          test -f "$dir/dashboard.v${v}.js"
          test -f "$dir/studio-editor.v${v}.js"

      - name: Check default dashboard compiles
        run: npm run check:default

      - run: npm run build

      - name: Verify embedded default project is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- src/studio/defaultProject.generated.ts; then
            echo "::error::defaultProject.generated.ts is stale."
            echo "Run 'npm run embed:default' and commit the result."
            git --no-pager diff --stat -- src/studio/defaultProject.generated.ts
            exit 1
          fi

      - name: Verify panel bundles
        shell: bash
        run: |
          v=$(jq -r .version custom_components/homeassistant_dashboard_studio/manifest.json)
          dashboard="custom_components/homeassistant_dashboard_studio/dashboard.v${v}.js"
          editor="custom_components/homeassistant_dashboard_studio/studio-editor.v${v}.js"
          test -f "$dashboard"
          test -f "$editor"
          unexpected=$(grep -oE 'from "\./[^"]+\.js"' "$dashboard" | grep -v "./studio-editor.v${v}.js" || true)
          if [ -n "$unexpected" ]; then
            echo "dashboard bundle must only import ./studio-editor.v${v}.js as an optional chunk."
            echo "$unexpected"
            exit 1
          fi

      - name: Ensure committed bundles are up to date
        shell: bash
        run: |
          v=$(jq -r .version custom_components/homeassistant_dashboard_studio/manifest.json)
          for f in "dashboard.v${v}.js" "studio-editor.v${v}.js"; do
            if ! git diff --quiet -- "custom_components/homeassistant_dashboard_studio/$f"; then
              echo "::error::custom_components/.../$f is stale."
              echo "Run 'npm run build' and commit the result."
              git --no-pager diff --stat -- "custom_components/homeassistant_dashboard_studio/$f"
              exit 1
            fi
          done

      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
