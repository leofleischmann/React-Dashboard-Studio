name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build & HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check default dashboard compiles
        run: npm run check:default

      - run: npm run build

      - name: Verify embedded default project is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- src/studio/defaultProject.generated.ts; then
            echo "::error::defaultProject.generated.ts is stale."
            echo "Run 'npm run embed:default' and commit the result."
            git --no-pager diff --stat -- src/studio/defaultProject.generated.ts
            exit 1
          fi

      - name: Verify panel bundles
        shell: bash
        run: |
          test -f custom_components/homeassistant_dashboard_studio/dashboard.js
          test -f custom_components/homeassistant_dashboard_studio/studio-editor.js
          unexpected=$(grep -oE 'from "\./[^"]+\.js"' custom_components/homeassistant_dashboard_studio/dashboard.js | grep -v './studio-editor.js' || true)
          if [ -n "$unexpected" ]; then
            echo "dashboard.js must only import ./studio-editor.js as an optional chunk."
            echo "$unexpected"
            exit 1
          fi

      - name: Ensure committed bundles are up to date
        shell: bash
        run: |
          for f in dashboard.js studio-editor.js; do
            if ! git diff --quiet -- "custom_components/homeassistant_dashboard_studio/$f"; then
              echo "::error::custom_components/.../$f is stale."
              echo "Run 'npm run build' and commit the result."
              git --no-pager diff --stat -- "custom_components/homeassistant_dashboard_studio/$f"
              exit 1
            fi
          done

      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
